    <path d="M0,-35 A35,35 0 0,1 30,-15" stroke="#A855F7" stroke-width="10" stroke-linecap="round" transform="rotate(72)"/>
    <path d="M0,-35 A35,35 0 0,1 30,-15" stroke="#3B82F6" stroke-width="10" stroke-linecap="round" transform="rotate(144)"/>
    <path d="M0,-35 A35,35 0 0,1 30,-15" stroke="#06B6D4" stroke-width="10" stroke-linecap="round" transform="rotate(216)"/>
    <path d="M0,-35 A35,35 0 0,1 30,-15" stroke="#F43F5E" stroke-width="10" stroke-linecap="round" transform="rotate(288)"/>
